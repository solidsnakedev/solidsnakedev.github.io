site: Jonathan 
title: Jonathan Blog
greetings: Hi, I'm Jonathan 👋
description: >-
  This is my personal blog
lang: en-US
timezone:  Europe/Rome
repo: https://github.com/solidsnakedev/solidsnakedev.github.io # site repo [optional]
data-theme: dark # default theme "dark" | "light"
#discus-identifier: powex # replace with your disqus shortname

author:
  name: Jonathan
  bio: personal blog
  userpicture: 
  username: solidsnakedev # general username
  github: solidsnakedev # github username
  twitter: # twitter username
  email: jona.ca@outlook.com # email adress

# Font Settings
googlewebfonts: family=Play:wght@400;700&family=Source+Code+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,300;1,400;1,500;1,600;1,700;1,900

# URL settings
url: "https://solidsnakedev.github.io" # Domain Name of host. [username].github.io for github pages
baseurl: "" # sub folder for jekyll site. only if jekyll site not in root of host. leave blank if not wishd. always add / in front.
permalink: pretty

# local
#url: "http://localhost:4000" # 
#baseurl: "" # 

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - .obsidian
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - CONTRIBUTING.md
  - Gemfile
  - .jekyll-cache
  
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-gist
  - jemoji
  - jekyll-remote-include

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:year/:month/:day/:slug
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled:     true
  collections: false


